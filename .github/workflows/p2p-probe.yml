name: p2p-probe

on:
  push:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  listener:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: build
        run: cargo build --release

      # Start the listener in the background. It writes rendezvous.json once a
      # relay reservation is accepted; the process keeps running across the
      # following steps because GitHub does not reap background processes
      # between steps of the same job.
      - name: start listener
        run: |
          set -euxo pipefail
          RUST_LOG=info ./target/release/p2p-probe \
            --timeout-secs 480 \
            listen --out rendezvous.json \
            > listener.log 2>&1 &
          echo $! > listener.pid
          for i in $(seq 1 120); do
            [ -f rendezvous.json ] && break
            if ! kill -0 "$(cat listener.pid)" 2>/dev/null; then
              echo "listener exited early"; cat listener.log; exit 1
            fi
            sleep 1
          done
          [ -f rendezvous.json ] || { echo "no reservation"; cat listener.log; exit 1; }
          cat rendezvous.json

      - name: publish rendezvous
        uses: actions/upload-artifact@v4
        with:
          name: rendezvous-${{ github.run_id }}-${{ github.run_attempt }}
          path: rendezvous.json
          retention-days: 1

      - name: wait for dialer
        run: |
          set -euxo pipefail
          pid=$(cat listener.pid)
          # Wait for the listener to exit (success on ping, failure on timeout).
          while kill -0 "$pid" 2>/dev/null; do sleep 2; done
          cat listener.log
          grep -q '^LISTENER_OK' listener.log

      - name: listener log on failure
        if: failure()
        run: cat listener.log || true

  dialer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: build
        run: cargo build --release

      # download-artifact cannot wait for an artifact from a sibling job, so
      # poll the REST API until the listener has uploaded it.
      - name: fetch rendezvous
        run: |
          set -euxo pipefail
          name="rendezvous-${{ github.run_id }}-${{ github.run_attempt }}"
          for i in $(seq 1 120); do
            if gh run download "${{ github.run_id }}" -n "$name" -D rv 2>/dev/null; then
              break
            fi
            sleep 5
          done
          test -f rv/rendezvous.json
          cat rv/rendezvous.json

      - name: dial
        run: |
          set -euxo pipefail
          RUST_LOG=info ./target/release/p2p-probe \
            --timeout-secs 240 \
            dial --rendezvous rv/rendezvous.json | tee dialer.out
          grep -q '^DIALER_RESULT' dialer.out

      - name: summary
        if: always()
        run: |
          {
            echo "## p2p-probe dialer"
            echo
            echo '```'
            cat dialer.out 2>/dev/null || echo "no output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
